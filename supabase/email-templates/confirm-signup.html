<!doctype html>
<html>
  <body style="margin:0;background:#efede5;color:#11110f;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#efede5;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#fbfaf4;border:1px solid #d8d4c8;">
            <tr>
              <td style="padding:28px 28px 10px;">
                <div style="font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#6e6b62;">FORMA</div>
                <h1 style="font-size:34px;line-height:1;margin:22px 0 0;color:#11110f;">Confirm your FORMA account.</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 28px;">
                <p style="font-size:15px;line-height:1.6;color:#35332e;margin:18px 0 28px;">
                  Use the secure link below to confirm this email address and finish signing up.
                </p>
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#e97864;color:#ffffff;text-decoration:none;font-size:12px;letter-spacing:.16em;text-transform:uppercase;padding:15px 22px;">
                  Confirm email
                </a>
                <p style="font-size:12px;line-height:1.6;color:#6e6b62;margin:28px 0 0;">
                  If you did not create a FORMA account, you can ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
